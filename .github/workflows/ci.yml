name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_FILE: docker-compose.yml

jobs:
  # ==========================================================================
  # 后端：ruff lint + pytest（覆盖率门槛 70%）
  # ==========================================================================
  backend-test:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql+asyncpg://autohr:autohr_dev@localhost:5432/autohr
      REDIS_URL: redis://localhost:6379/0
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: autohr
      MINIO_SECRET_KEY: autohr_dev_secret
      MINIO_BUCKET: resumes
      MINIO_USE_SSL: "false"
      SECRET_KEY: ci-secret-key-for-jwt-and-fernet-must-be-at-least-32-bytes
      JWT_PRIVATE_KEY_PATH: /tmp/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /tmp/keys/public.pem
      FERNET_KEY: ZDnD3sL8r6M5hV9kq2bC7fXw4pJ1aG0yY7uS8tE5oRk=
      ENVIRONMENT: test
      ZHIPU_API_KEY: ""
      DASHSCOPE_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Generate JWT keys
        run: |
          mkdir -p /tmp/keys
          openssl genrsa -out /tmp/keys/private.pem 2048
          openssl rsa -in /tmp/keys/private.pem -pubout -out /tmp/keys/public.pem

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # GitHub Actions services 块不支持 command 字段；minio/minio:latest 默认
      # ENTRYPOINT 不再带 server /data，会卡在 help。改在 step 里手动 docker run
      # 让三个依赖都按正确参数启动，与本地 docker-compose 行为一致。
      - name: Start postgres / redis / minio
        run: |
          docker network create ci-net || true

          docker run -d --name ci-postgres --network ci-net \
            --network-alias postgres \
            -p 5432:5432 \
            -e POSTGRES_USER=autohr \
            -e POSTGRES_PASSWORD=autohr_dev \
            -e POSTGRES_DB=autohr \
            postgres:15-alpine

          docker run -d --name ci-redis --network ci-net \
            --network-alias redis \
            -p 6379:6379 \
            redis:7-alpine

          docker run -d --name ci-minio --network ci-net \
            --network-alias minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=autohr \
            -e MINIO_ROOT_PASSWORD=autohr_dev_secret \
            -e MINIO_KMS_SECRET_KEY=autohr-dev-kms-key:P35h6DBJhqXxPWi2u+WXwLF2ehdi+1XpDuXhAyb1gJM= \
            minio/minio:latest server /data

      - name: Wait for services healthy
        run: |
          for i in {1..40}; do
            ok=1
            docker exec ci-postgres pg_isready -U autohr >/dev/null 2>&1 || ok=0
            docker exec ci-redis redis-cli ping 2>&1 | grep -q PONG || ok=0
            curl -sf http://localhost:9000/minio/health/live >/dev/null 2>&1 || ok=0
            [ $ok -eq 1 ] && break
            sleep 2
          done
          if [ $ok -ne 1 ]; then
            echo "services not ready"; docker logs ci-postgres; docker logs ci-redis; docker logs ci-minio; exit 1
          fi

      - name: Init MinIO bucket
        run: |
          docker run --rm --network=host --entrypoint sh minio/mc:latest -c '
            sleep 2;
            mc alias set ci http://localhost:9000 autohr autohr_dev_secret;
            mc mb ci/resumes --ignore-existing || true;
          '

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Pytest with coverage
        working-directory: backend
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== postgres ==="; docker logs ci-postgres 2>&1 | tail -30
          echo "=== redis ==="; docker logs ci-redis 2>&1 | tail -30
          echo "=== minio ==="; docker logs ci-minio 2>&1 | tail -30

      - name: Shutdown
        if: always()
        run: |
          docker rm -f ci-postgres ci-redis ci-minio || true
          docker network rm ci-net || true

  # ==========================================================================
  # 前端：lint + tsc + vitest
  # ==========================================================================
  frontend-test:
    name: Frontend lint + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.4
          run_install: false

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Vitest
        run: pnpm exec vitest run --coverage || pnpm exec vitest run

      - name: Next build
        run: pnpm build

  # ==========================================================================
  # E2E：起完整 docker-compose 后跑 Playwright
  # ==========================================================================
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Generate JWT keys
        run: |
          mkdir -p backend/keys
          openssl genrsa -out backend/keys/private.pem 2048
          openssl rsa -in backend/keys/private.pem -pubout -out backend/keys/public.pem
          chmod 600 backend/keys/private.pem

      - name: Create .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=autohr
          POSTGRES_PASSWORD=autohr_dev
          POSTGRES_DB=autohr
          SECRET_KEY=ci-secret-key-for-jwt-and-fernet-must-be-at-least-32-bytes
          FERNET_KEY=ZDnD3sL8r6M5hV9kq2bC7fXw4pJ1aG0yY7uS8tE5oRk=
          ZHIPU_API_KEY=
          DASHSCOPE_API_KEY=
          ENVIRONMENT=test
          EOF

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d --wait

      - name: Run migrations
        run: docker compose exec -T backend alembic upgrade head

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps (for Playwright)
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Wait for services healthy
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && curl -sf http://localhost:3000 && break
            sleep 2
          done

      - name: Run Playwright
        working-directory: frontend
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose logs --tail=500

      - name: Shutdown
        if: always()
        run: docker compose down -v

  # ==========================================================================
  # 构建 & 推送镜像到 GHCR（仅 main 分支）
  # ==========================================================================
  build-push:
    name: Build and push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-test, frontend-test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: tag
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
