# 生产 docker-compose：使用预构建镜像（来自 GHCR）+ nginx 反代 + 健康检查 + 资源限制
#
# 用法：
#   1. 准备 .env.prod（参考 .env.example，所有密钥用强随机值）
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. docker compose -f docker-compose.prod.yml exec backend alembic upgrade head
#
# 安全要点：
#   - postgres/redis/minio 不暴露端口（仅内网通信）
#   - 唯一对外端口是 nginx 80
#   - JWT 密钥通过只读挂载，不入镜像
#   - 所有服务配 healthcheck + mem_limit
services:
  postgres:
    image: postgres:15-alpine
    container_name: autohr-prod-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: autohr-prod-redis
    restart: always
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: autohr-prod-minio
    restart: always
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  minio-init:
    image: minio/mc:latest
    container_name: autohr-prod-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set prod http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb prod/${MINIO_BUCKET} --ignore-existing;
      exit 0;
      "
    networks:
      - internal
    restart: "no"

  backend:
    image: ghcr.io/${GITHUB_REPO:-autohr/autohr}/backend:latest
    container_name: autohr-prod-backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: "false"
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      ENVIRONMENT: production
    volumes:
      - ./backend/keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G

  worker:
    image: ghcr.io/${GITHUB_REPO:-autohr/autohr}/backend:latest
    container_name: autohr-prod-worker
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: "false"
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G

  beat:
    image: ghcr.io/${GITHUB_REPO:-autohr/autohr}/backend:latest
    container_name: autohr-prod-beat
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=warning
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    image: ghcr.io/${GITHUB_REPO:-autohr/autohr}/frontend:latest
    container_name: autohr-prod-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    build: ./nginx
    container_name: autohr-prod-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
